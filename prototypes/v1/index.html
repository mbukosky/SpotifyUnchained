<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpotifyUnchained // Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Scanline overlay -->
  <div class="scanlines" aria-hidden="true"></div>

  <!-- CRT flicker overlay -->
  <div class="crt-flicker" aria-hidden="true"></div>

  <header class="header">
    <div class="header__inner">
      <div class="header__brand">
        <h1 class="header__title">
          <span class="prompt-symbol">&#x276F;</span>
          <span class="title-text">SpotifyUnchained</span>
          <span class="cursor-blink">_</span>
        </h1>
        <p class="header__tagline">
          <span class="tagline-prefix">// </span>
          <span class="typewriter" id="typewriter"></span>
        </p>
      </div>

      <nav class="header__nav">
        <div class="region-filters" role="group" aria-label="Region filter">
          <button class="region-btn active" data-region="ALL">
            <span class="btn-bracket">[</span>ALL<span class="btn-bracket">]</span>
          </button>
          <button class="region-btn" data-region="US">
            <span class="btn-bracket">[</span>US<span class="btn-bracket">]</span>
          </button>
          <button class="region-btn" data-region="UK">
            <span class="btn-bracket">[</span>UK<span class="btn-bracket">]</span>
          </button>
        </div>

        <div class="header__actions">
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
          <a href="https://github.com/mbukosky/SpotifyUnchained" target="_blank" rel="noopener noreferrer" class="github-link" aria-label="GitHub repository">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
          </a>
        </div>
      </nav>

      <!-- Mobile menu toggle -->
      <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="terminal-status" id="terminalStatus">
      <span class="status-prompt">$</span>
      <span class="status-text">loading playlists...</span>
    </div>

    <div class="playlist-container" id="playlistContainer">
      <!-- Playlists rendered by JS -->
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__disclaimer">
        <span class="prompt-symbol">&#x276F;</span>
        <span class="disclaimer-text">Not an official Spotify application. Built for archival purposes.</span>
      </p>
      <a href="https://github.com/mbukosky/SpotifyUnchained" target="_blank" rel="noopener noreferrer" class="footer__github">
        <span class="footer-link-text">github.com/mbukosky/SpotifyUnchained</span>
      </a>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
